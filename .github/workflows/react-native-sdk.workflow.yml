name: ReactNative-SDK-Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Configuration environment
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - rc
          - prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true
env:
  NODE_VERSION: '22'
  RC_SUFFIX: 'rc'
  GLOBAL_ENV: ${{ github.event_name == 'push' && format('{0}', 'dev') || inputs.environment }}
jobs:
  build-react-native-sdk:
    runs-on: macos-26
    steps:
      - name: Git clone repository
        uses: actions/checkout@v4
      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      # Install dependencies
      - name: Install dependencies
        run: corepack enable && yarn set version 3.6.1 && yarn install --frozen-lockfile
      # Build and Publish SDK
      - name: Build and Publish SDK
        if: ${{ env.GLOBAL_ENV == 'prod' || env.GLOBAL_ENV == 'rc' }}
        run: npm publish --tag ${{ env.RELEASE_TAG }} --access public
        env:
          RELEASE_TAG: ${{ env.GLOBAL_ENV == 'prod' && format('{0}', 'latest' ) || env.RC_SUFFIX }}
